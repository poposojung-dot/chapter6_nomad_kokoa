<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Welcome to Kokoa Talk</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div id="status-bar">
      <div class="status-bar__column">
        <span>No Service</span>
        <i class="fa-solid fa-wifi"></i>
      </div>
      <div class="status-bar__column">
        <span>18:43</span>
      </div>
      <div class="status-bar__column">
        <span>110%</span>
        <i class="fa-solid fa-battery-full"></i>
        <i class="fa-solid fa-bolt"></i>
      </div>
    </div>

    <header class="welcome-header">
      <h1 class="welcome-header__title">
        Welcome to Kokoa Clone</h1>
      <p class="welcome-header__text"> 
        If you have a Kokoa Account, log in with your email or phone number. </p>
    </header>
    <form action="kokoa-profile.html" id="login-form">
      <!-- input  action or method -->
      <input type="text" placeholder="Email or Phone number">
      <input type="password" placeholder="Password">
      <input type="submit" value="Log in">
      <!-- <button></button> -->
      <a href="#">Find Kokoa Account or Password </a>
    </form>
    
    <script
      src="https://kit.fontawesome.com/c16a63f17d.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
